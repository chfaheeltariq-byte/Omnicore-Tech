<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message Sent | Omnicore Tech</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
        color: #0f172a;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 640px);
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.92);
        padding: 40px 28px;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 18px 0 0;
        font-size: 1.05rem;
        line-height: 1.8;
        color: #475569;
      }

      a {
        display: inline-block;
        margin-top: 28px;
        padding: 14px 22px;
        border-radius: 999px;
        background: #0f172a;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Message Sent</h1>
      <p>Your inquiry has been submitted successfully. Omnicore Tech will receive it in the inbox and get back to you soon.</p>
      <a href="/">Back to Website</a>
    </main>
  </body>
</html>
